<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Attenly</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
background: radial-gradient(circle at 20% 20%, #6366f1, transparent 40%),
radial-gradient(circle at 80% 30%, #a855f7, transparent 40%),
radial-gradient(circle at 50% 80%, #ec4899, transparent 40%),
#020617;
}

.glass{
background: rgba(255,255,255,0.08);
backdrop-filter: blur(20px);
border: 1px solid rgba(255,255,255,0.15);
}

</style>

</head>

<body class="min-h-screen flex items-center justify-center text-white">

<div class="glass rounded-3xl p-8 w-96 text-center shadow-2xl">

<h1 class="text-4xl font-bold mb-2 tracking-wide">
Attenly
</h1>

<p class="text-gray-300 mb-6">
Smart QR Attendance
</p>

<div id="intro">

<div class="text-sm text-gray-300 mb-6 leading-relaxed">

1️⃣ Start attendance  
<br>
2️⃣ Scan QR code  
<br>
3️⃣ GPS location verified  
<br>
4️⃣ Attendance recorded

</div>

<button onclick="startScanner()"
class="w-full py-3 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 font-semibold hover:scale-105 transition">

Start Attendance

</button>

</div>


<div id="scanner" class="hidden">

<div id="reader" class="rounded-xl overflow-hidden mb-4"></div>

<p id="status" class="text-sm text-gray-300"></p>

</div>

</div>


<footer class="absolute bottom-6 text-sm text-gray-400">

Developed by 
<a href="https://ahtasamzidan.vercel.app" target="_blank" class="text-indigo-400 hover:underline">

Ahtasam Zidan

</a>

</footer>


<script>

let html5QrCode

function startScanner(){

document.getElementById("intro").style.display="none"
document.getElementById("scanner").style.display="block"

html5QrCode = new Html5Qrcode("reader")

Html5Qrcode.getCameras().then(devices => {

let backCamera = devices[devices.length - 1].id

html5QrCode.start(
backCamera,
{ fps:10, qrbox:250 },
onScanSuccess
)

})

}

function onScanSuccess(decodedText){

navigator.geolocation.getCurrentPosition(function(position){

let lat = position.coords.latitude
let lng = position.coords.longitude

let mapLink = "https://maps.google.com/?q="+lat+","+lng

document.getElementById("status").innerHTML=

"✅ QR: "+decodedText+
"<br>📍 "+lat+", "+lng+
"<br><a href='"+mapLink+"' target='_blank' class='text-indigo-400 underline'>Open Map</a>"

})

}

</script>

</body>
</html>
