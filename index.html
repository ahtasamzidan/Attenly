<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Attenly</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<div class="app">

<header>
<h1>Attenly</h1>
<p>Smart QR Attendance</p>
</header>


<!-- PROCESS STEPS -->

<div class="steps">

<div class="step">
<div class="icon">▶</div>
<p>Start Attendance</p>
</div>

<div class="step">
<div class="icon">📷</div>
<p>Scan QR Code</p>
</div>

<div class="step">
<div class="icon">📍</div>
<p>Verify GPS</p>
</div>

<div class="step">
<div class="icon">✔</div>
<p>Attendance Saved</p>
</div>

</div>


<button class="start-btn" onclick="startScanner()">
Start Attendance
</button>


<div id="scanner" class="scanner hidden">
<div id="reader"></div>
<p id="status"></p>
</div>

</div>


<footer>
Developed by 
<a href="https://ahtasamzidan.vercel.app" target="_blank">
Ahtasam Zidan
</a>
</footer>


<script src="app.js"></script>

</body>
</html>
