<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Attenly</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body class="bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500 min-h-screen flex flex-col items-center justify-center text-white">

<div class="bg-white text-gray-800 rounded-3xl shadow-2xl p-6 w-96 text-center">

<h1 class="text-3xl font-bold mb-2">Attenly</h1>
<p class="text-gray-500 mb-4">Smart QR Attendance</p>

<div id="reader" class="rounded-xl overflow-hidden mb-4"></div>

<button onclick="getLocation()" 
class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-semibold transition">

Verify GPS Location

</button>

<p id="location" class="text-sm text-gray-500 mt-3"></p>

</div>

<footer class="absolute bottom-5 text-sm text-white opacity-80">

Developed by 
<a href="https://ahtasamzidan.vercel.app" target="_blank" class="underline font-semibold">
Ahtasam Zidan
</a>

</footer>

<script>

function onScanSuccess(decodedText) {

alert("QR Code Scanned: " + decodedText)

}

let scanner = new Html5QrcodeScanner(
"reader",
{ fps:10, qrbox:220 }
)

scanner.render(onScanSuccess)

function getLocation(){

navigator.geolocation.getCurrentPosition(function(position){

let lat = position.coords.latitude
let lng = position.coords.longitude

document.getElementById("location").innerText =
"Latitude: " + lat + " | Longitude: " + lng

})

}

</script>

</body>
</html>
