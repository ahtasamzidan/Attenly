<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Attenly</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body class="bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500 min-h-screen flex items-center justify-center text-white">

<div class="bg-white text-gray-800 rounded-3xl shadow-xl p-6 w-96 text-center">

<h1 class="text-3xl font-bold mb-2">Attenly</h1>
<p class="text-gray-500 mb-4">Smart QR Attendance</p>

<!-- PROCESS STEPS -->

<div id="intro">

<img src="https://cdn-icons-png.flaticon.com/512/942/942748.png" 
class="w-20 mx-auto mb-4">

<p class="text-sm text-gray-600 mb-4">

1️⃣ Press Start Attendance  
<br>
2️⃣ Scan the QR Code  
<br>
3️⃣ GPS location verified  
<br>
4️⃣ Attendance recorded

</p>

<button onclick="startScanner()" 
class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-semibold">

Start Attendance

</button>

</div>

<!-- SCANNER AREA -->

<div id="scanner" class="hidden">

<div id="reader" class="mb-4"></div>

<p id="status" class="text-sm text-gray-600"></p>

</div>

</div>

<footer class="absolute bottom-5 text-white text-sm">

Developed by 
<a href="https://ahtasamzidan.vercel.app" target="_blank" class="underline font-semibold">
Ahtasam Zidan
</a>

</footer>

<script>

let html5QrCode

function startScanner(){

document.getElementById("intro").style.display="none"
document.getElementById("scanner").style.display="block"

html5QrCode = new Html5Qrcode("reader")

Html5Qrcode.getCameras().then(devices => {

let backCamera = devices[devices.length - 1].id

html5QrCode.start(

backCamera,

{ fps:10, qrbox:250 },

onScanSuccess

)

})

}

function onScanSuccess(decodedText){

navigator.geolocation.getCurrentPosition(function(position){

let lat = position.coords.latitude
let lng = position.coords.longitude

let mapLink = "https://maps.google.com/?q="+lat+","+lng

document.getElementById("status").innerHTML=

"✅ QR: "+decodedText+
"<br>📍 Lat: "+lat+
"<br>📍 Lng: "+lng+
"<br><a href='"+mapLink+"' target='_blank' class='text-indigo-600 underline'>Open Location</a>"

})

}

</script>

</body>
</html>
