<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Attenly</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#0f172a;
color:white;
overflow:hidden;
}

/* Premium gradient glow background */

body::before{
content:"";
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle,#6366f1,transparent 60%);
top:-150px;
left:-150px;
filter:blur(120px);
}

body::after{
content:"";
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle,#a855f7,transparent 60%);
bottom:-150px;
right:-150px;
filter:blur(120px);
}

/* Glass card */

.card{
position:relative;
width:360px;
padding:30px;
border-radius:24px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 20px 40px rgba(0,0,0,0.5);
text-align:center;
}

/* Title */

.title{
font-size:30px;
font-weight:700;
margin-bottom:5px;
}

.subtitle{
color:#cbd5f5;
margin-bottom:25px;
font-size:14px;
}

/* Steps */

.steps{
text-align:left;
font-size:14px;
line-height:28px;
color:#e2e8f0;
margin-bottom:25px;
}

/* Button */

.start-btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-size:15px;
font-weight:600;
background:linear-gradient(90deg,#6366f1,#a855f7);
color:white;
cursor:pointer;
transition:0.3s;
}

.start-btn:hover{
transform:scale(1.05);
}

/* Scanner */

#reader{
margin-top:20px;
border-radius:12px;
overflow:hidden;
}

/* Footer */

footer{
position:absolute;
bottom:15px;
font-size:13px;
color:#94a3b8;
}

footer a{
color:#818cf8;
text-decoration:none;
}

footer a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="card">

<div id="intro">

<div class="title">Attenly</div>
<div class="subtitle">Smart QR Attendance</div>

<div class="steps">

1️⃣ Start attendance<br>
2️⃣ Scan the QR code<br>
3️⃣ GPS location verified<br>
4️⃣ Attendance recorded

</div>

<button class="start-btn" onclick="startScanner()">
Start Attendance
</button>

</div>

<div id="scanner" style="display:none;">
<div id="reader"></div>
<p id="status" style="margin-top:15px;font-size:13px;"></p>
</div>

</div>

<footer>
Developed by 
<a href="https://ahtasamzidan.vercel.app" target="_blank">
Ahtasam Zidan
</a>
</footer>

<script>

let html5QrCode;

function startScanner(){

document.getElementById("intro").style.display="none";
document.getElementById("scanner").style.display="block";

html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {

let backCamera = devices[devices.length-1].id;

html5QrCode.start(
backCamera,
{ fps:10, qrbox:250 },
onScanSuccess
);

});

}

function onScanSuccess(decodedText){

navigator.geolocation.getCurrentPosition(function(pos){

let lat = pos.coords.latitude;
let lng = pos.coords.longitude;

let map="https://maps.google.com/?q="+lat+","+lng;

document.getElementById("status").innerHTML=
"QR: "+decodedText+"<br>"+
"Location: "+lat+", "+lng+"<br>"+
"<a href='"+map+"' target='_blank'>Open Map</a>";

});

}

</script>

</body>
</html>
