<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Attenly</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<div class="bg"></div>

<div class="app">

<header>
<h1>Attenly</h1>
<p>Smart QR Attendance</p>
</header>


<div class="input-box">

<input id="name" placeholder="Enter your name">

<button onclick="startScanner()">
Start Attendance
</button>

</div>


<div id="scanner" class="hidden">

<div class="scan-box">

<div class="scan-line"></div>

<div id="reader"></div>

</div>

<p id="status"></p>

</div>

<div id="success" class="hidden success">

✔ Attendance Recorded

</div>

</div>


<footer>

Developed by 
<a href="https://ahtasamzidan.vercel.app" target="_blank">

Ahtasam Zidan

</a>

</footer>

<script src="app.js"></script>

</body>
</html>
