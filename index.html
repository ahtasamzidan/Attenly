<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Attenly</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body class="bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500 min-h-screen flex items-center justify-center">

<div class="bg-white p-6 rounded-3xl shadow-xl w-96 text-center">

<h1 class="text-3xl font-bold mb-2">Attenly</h1>
<p class="text-gray-500 mb-4">Scan QR to Check In</p>

<div id="reader"></div>

<p id="status" class="text-sm mt-4 text-gray-600"></p>

</div>

<footer class="absolute bottom-4 text-white text-sm">

Developed by 
<a href="https://ahtasamzidan.vercel.app" class="underline">
Ahtasam Zidan
</a>

</footer>

<script>

let officeLat = 3.1390
let officeLng = 101.6869

function sendData(qr, lat, lng){

let mapLink = "https://maps.google.com/?q="+lat+","+lng
let time = new Date().toLocaleString()

fetch("YOUR_GOOGLE_SCRIPT_URL",{

method:"POST",

body: JSON.stringify({

qr:qr,
lat:lat,
lng:lng,
map:mapLink,
time:time

})

})

}

function onScanSuccess(decodedText){

navigator.geolocation.getCurrentPosition(function(position){

let lat = position.coords.latitude
let lng = position.coords.longitude

document.getElementById("status").innerHTML =

"QR: "+decodedText+"<br>"+
"Latitude: "+lat+"<br>"+
"Longitude: "+lng+"<br>"+
"<a href='https://maps.google.com/?q="+lat+","+lng+"' target='_blank'>Open Location</a>"

sendData(decodedText, lat, lng)

})

}

const html5QrCode = new Html5Qrcode("reader")

Html5Qrcode.getCameras().then(devices => {

let backCamera = devices[devices.length - 1].id

html5QrCode.start(

backCamera,

{ fps:10, qrbox:250 },

onScanSuccess

)

})

</script>

</body>
</html>
